name: Playtomic Court Monitor

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-courts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      # Restore previous state so we can diff
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: .playtomic_state.json
          key: playtomic-state-${{ github.run_id }}
          restore-keys: playtomic-state-

      - name: Check court availability
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python playtomic_monitor.py once
