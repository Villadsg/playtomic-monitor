name: Playtomic Court Monitor

on:
  schedule:
    # Restart hourly in case the previous run ended
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger

# Only allow one instance at a time
concurrency:
  group: playtomic-monitor
  cancel-in-progress: false

jobs:
  check-courts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      # Restore previous state so we can diff
      - name: Restore state
        uses: actions/cache@v4
        with:
          path: .playtomic_state.json
          key: playtomic-state-${{ github.run_id }}
          restore-keys: playtomic-state-

      - name: Check court availability (loop for 55 min)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for i in $(seq 1 13); do
            echo "=== Check $i/13 ==="
            python playtomic_monitor.py once
            if [ $i -lt 13 ]; then
              echo "Sleeping 4 minutes..."
              sleep 240
            fi
          done
